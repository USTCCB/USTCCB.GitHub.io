<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting</title>
    <script>
      (function () {
        var targetBase = "https://ustccb-git-hub-io.vercel.app";
        var target = targetBase + window.location.pathname + window.location.search + window.location.hash;
        window.location.replace(target);
      })();
    </script>
  </head>
  <body></body>
</html>
