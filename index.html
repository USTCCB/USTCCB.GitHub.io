<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>USTCCB Personal Hub</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(217, 119, 87, 0.22), transparent 28%),
          radial-gradient(circle at 80% 10%, rgba(109, 157, 197, 0.2), transparent 24%),
          linear-gradient(180deg, #f8f4ee 0%, #f6f2eb 100%);
        color: #1b2230;
      }

      .shell {
        width: min(100%, 720px);
        border: 1px solid rgba(27, 34, 48, 0.1);
        border-radius: 28px;
        padding: 32px;
        background: rgba(255, 255, 255, 0.82);
        box-shadow: 0 20px 60px rgba(41, 50, 65, 0.1);
        backdrop-filter: blur(18px);
      }

      .eyebrow {
        margin: 0;
        color: #b85a3d;
        font-size: 12px;
        letter-spacing: 0.32em;
        text-transform: uppercase;
      }

      h1 {
        margin: 18px 0 12px;
        font-size: clamp(2rem, 6vw, 3.6rem);
        line-height: 1.02;
      }

      p {
        margin: 0;
        font-size: 16px;
        line-height: 1.8;
        color: #5e6778;
      }

      a {
        display: inline-flex;
        margin-top: 24px;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        padding: 12px 20px;
        background: #1b2230;
        color: white;
        text-decoration: none;
      }
    </style>
    <script>
      (function () {
        var targetBase = "https://ustccb-git-hub-io.vercel.app";
        var target = targetBase + window.location.pathname + window.location.search + window.location.hash;
        window.location.replace(target);
      })();
    </script>
  </head>
  <body>
    <main class="shell">
      <p class="eyebrow">Redirecting To The New Full Stack Site</p>
      <h1>正在带你进入新版个人站。</h1>
      <p>
        现在的正式版本已经迁移到新的全栈入口，博客、相册、日记和接口都在那里统一运行。
      </p>
      <a href="https://ustccb-git-hub-io.vercel.app">如果没有自动跳转，点这里继续</a>
    </main>
  </body>
</html>
