<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Blogs - USTCCB</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .blog-container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .blog-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 12px 16px 12px 44px;
            background: var(--card-bg);
            border: var(--glass-border);
            border-radius: 10px;
            color: var(--text-color);
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s;
        }

        .search-box input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
        }

        .search-box i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .filter-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .filter-tag {
            padding: 8px 16px;
            background: var(--card-bg);
            border: var(--glass-border);
            border-radius: 20px;
            color: var(--text-muted);
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .filter-tag:hover, .filter-tag.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .blog-list {
            display: grid;
            gap: 24px;
            margin-bottom: 40px;
        }

        .blog-card {
            background: var(--card-bg);
            border: var(--glass-border);
            border-radius: 16px;
            padding: 28px;
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .blog-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary-color), var(--accent-color));
            transform: scaleX(0);
            transition: transform 0.3s;
        }

        .blog-card:hover {
            transform: translateY(-4px);
            background: var(--card-hover);
            box-shadow: 0 12px 40px rgba(139, 92, 246, 0.2);
        }

        .blog-card:hover::before {
            transform: scaleX(1);
        }

        .blog-meta {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 12px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .blog-meta i {
            margin-right: 4px;
        }

        .blog-title {
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--text-color);
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .blog-excerpt {
            color: var(--text-muted);
            line-height: 1.7;
            margin-bottom: 16px;
        }

        .blog-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid var(--border-color);
        }

        .blog-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .tag {
            background: rgba(139, 92, 246, 0.1);
            color: var(--primary-color);
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .blog-stats {
            display: flex;
            gap: 16px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .blog-stats span {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 40px;
        }

        .page-btn {
            padding: 10px 16px;
            background: var(--card-bg);
            border: var(--glass-border);
            border-radius: 8px;
            color: var(--text-color);
            cursor: pointer;
            transition: all 0.3s;
        }

        .page-btn:hover, .page-btn.active {
            background: var(--primary-color);
            color: white;
        }

        .page-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .no-results i {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        .write-btn {
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
            text-decoration: none;
        }
        .write-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(139, 92, 246, 0.4);
        }
        /* 写博客弹窗 */
        .write-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 999;
            display: none; align-items: center; justify-content: center;
            backdrop-filter: blur(4px);
        }
        .write-modal.active { display: flex; }
        .write-modal-content {
            background: var(--card-bg); border: var(--glass-border);
            border-radius: 16px; padding: 30px;
            max-width: 700px; width: 90%; max-height: 90vh; overflow-y: auto;
        }
        .write-modal h2 { margin-bottom: 20px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 6px; color: var(--text-muted); font-size: 0.9rem; }
        .form-input, .form-textarea {
            width: 100%; padding: 12px; background: rgba(0,0,0,0.3);
            border: 1px solid var(--border-color); border-radius: 8px;
            color: var(--text-color); font-size: 0.95rem; outline: none;
            transition: border-color 0.3s; box-sizing: border-box;
        }
        .form-textarea { min-height: 200px; resize: vertical; font-family: inherit; line-height: 1.6; }
        .form-input:focus, .form-textarea:focus { border-color: var(--primary-color); }
        .modal-buttons { display: flex; gap: 12px; justify-content: flex-end; margin-top: 20px; }
        .btn-secondary {
            background: var(--card-bg); border: var(--glass-border);
            color: var(--text-color); padding: 10px 20px;
            border-radius: 8px; cursor: pointer; transition: all 0.3s;
        }
        .btn-secondary:hover { background: var(--card-hover); }
        .toast {
            position: fixed; bottom: 30px; right: 30px;
            background: #10b981; color: white; padding: 14px 24px;
            border-radius: 10px; font-size: 0.95rem; z-index: 2000;
            display: none; animation: slideIn 0.3s ease;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
</head>

    <div class="toast" id="toast"></div>

    <script>
        const API_BASE = 'https://backend-production-4de2.up.railway.app';
        console.log('[myBlogs] API_BASE:', API_BASE);

        let blogs = [];
        let currentFilter = 'all';
        let currentPage = 1;
        const blogsPerPage = 4;
        let token = localStorage.getItem('blog_token') || '';

        // 本地静态数据作为后备（后端不可用时使用）
        const fallbackBlogs = [
            {

            },
            {

                excerpt: 'Flexbox 很棒，但 Grid 才是二维布局的王者。本文将带你从零开始掌握 CSS Grid，学会如何构建复杂的响应式布局，并提供大量实战案例。',

                author: 'AnranWu',
                readTime: '12 分钟',
                views: 2156,
                likes: 145,
                tags: ['CSS', 'Design', 'Layout']
            },
            {
                id: 3,
                title: 'AI 时代的思考：机遇与挑战',
                excerpt: '人工智能正在改变世界。从 ChatGPT 到 Midjourney，AI 工具正在重塑我们的工作方式。作为开发者，我们应该如何应对这场变革？本文分享我的一些思考。',
                date: '2024-01-20',
                author: 'AnranWu',
                readTime: '6 分钟',
                views: 3421,
                likes: 267,
                tags: ['AI', 'Life', 'Thoughts']
            },
            {
                id: 4,
                title: 'React Hooks 最佳实践',
                excerpt: 'Hooks 改变了我们编写 React 组件的方式。本文总结了使用 Hooks 的最佳实践，包括 useState、useEffect、useCallback 等常用 Hooks 的使用技巧和性能优化方法。',
                date: '2024-01-15',
                author: 'AnranWu',
                readTime: '10 分钟',
                views: 1876,
                likes: 132,
                tags: ['JavaScript', 'React', 'Frontend']
            }
        ];

        document.addEventListener('DOMContentLoaded', () => {
            initTheme();
            setupEventListeners();
            loadBlogsFromBackend();
        });

        function initTheme() {
            const themeToggle = document.getElementById('themeToggle');
            const currentTheme = localStorage.getItem('theme') || 'dark';

            if (currentTheme === 'light') {
                document.body.classList.add('light-theme');
                themeToggle.innerHTML = '<i class="fa-solid fa-sun"></i>';
            }

            themeToggle.addEventListener('click', () => {
                document.body.classList.toggle('light-theme');
                const isLight = document.body.classList.contains('light-theme');
                localStorage.setItem('theme', isLight ? 'light' : 'dark');
                themeToggle.innerHTML = isLight ? '<i class="fa-solid fa-sun"></i>' : '<i class="fa-solid fa-moon"></i>';
            });
        }

        async function loadBlogsFromBackend() {
            console.log('[myBlogs] loadBlogsFromBackend called');
            const blogList = document.getElementById('blogList');
            const noResults = document.getElementById('noResults');

            try {
                blogList.innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:40px 0;">正在从后端加载博客...</p>';

                const res = await fetch(`${API_BASE}/api/blog?page=1&limit=50`);
                console.log('[myBlogs] API response status:', res.status);
                if (!res.ok) throw new Error('后端返回错误状态');

                const json = await res.json();
                console.log('[myBlogs] API response data:', json);
                const posts = json?.data?.posts || [];

                if (Array.isArray(posts) && posts.length > 0) {
                    blogs = posts.map(post => ({
                        id: post.id,
                        title: post.title,
                        excerpt: post.summary || (post.content ? post.content.slice(0, 120) + '...' : ''),
                        date: post.created_at ? new Date(post.created_at).toISOString().slice(0, 10) : '',
                        author: post.username || '匿名',
                        readTime: '阅读中',
                        views: post.view_count || 0,
                        likes: post.like_count || 0,
                        tags: Array.isArray(post.tags) && post.tags.length > 0 ? post.tags : ['Blog']
                    }));
                    console.log('[myBlogs] Loaded blogs count:', blogs.length);
                } else {
                    console.log('[myBlogs] No posts in API response');
                    blogs = [];
                }
            } catch (e) {
                console.error('[myBlogs] loadBlogsFromBackend error:', e);
                blogs = [];
                noResults.style.display = 'none';
            }

            // 合并本地存储的博客（本地优先显示在前）
            const localBlogs = JSON.parse(localStorage.getItem('local_blogs') || '[]');
            blogs = [...localBlogs, ...blogs];
            console.log('[myBlogs] Total blogs after merge:', blogs.length);

            renderBlogs();
        }

        function setupEventListeners() {
            document.getElementById('searchInput').addEventListener('input', (e) => {
                currentPage = 1;
                renderBlogs(e.target.value);
            });

            document.querySelectorAll('.filter-tag').forEach(tag => {
                tag.addEventListener('click', () => {
                    document.querySelectorAll('.filter-tag').forEach(t => t.classList.remove('active'));
                    tag.classList.add('active');
                    currentFilter = tag.dataset.tag;
                    currentPage = 1;
                    renderBlogs();
                });
            });
        }

        function renderBlogs(searchTerm = '') {
            if (!Array.isArray(blogs) || blogs.length === 0) {
                const blogList = document.getElementById('blogList');
                const noResults = document.getElementById('noResults');
                blogList.style.display = 'none';
                noResults.style.display = 'block';
                document.getElementById('pagination').style.display = 'none';
                return;
            }

            let filtered = blogs.slice();

            if (currentFilter !== 'all') {
                filtered = filtered.filter(blog => Array.isArray(blog.tags) && blog.tags.includes(currentFilter));
            }

            if (searchTerm) {
                const term = searchTerm.toLowerCase();
                filtered = filtered.filter(blog =>
                    (blog.title || '').toLowerCase().includes(term) ||
                    (blog.excerpt || '').toLowerCase().includes(term) ||
                    (blog.tags || []).some(tag => String(tag).toLowerCase().includes(term))
                );
            }

            const blogList = document.getElementById('blogList');
            const noResults = document.getElementById('noResults');

            if (filtered.length === 0) {
                blogList.style.display = 'none';
                noResults.style.display = 'block';
                document.getElementById('pagination').style.display = 'none';
                return;
            }

            blogList.style.display = 'grid';
            noResults.style.display = 'none';

            const totalPages = Math.ceil(filtered.length / blogsPerPage);
            const start = (currentPage - 1) * blogsPerPage;
            const end = start + blogsPerPage;
            const paginatedBlogs = filtered.slice(start, end);

            blogList.innerHTML = paginatedBlogs.map(blog => `
                <article class="blog-card">
                    <div class="blog-meta">
                        <span><i class="fa-regular fa-calendar"></i>${blog.date || ''}</span>
                        <span><i class="fa-regular fa-clock"></i>${blog.readTime || ''}</span>
                        <span><i class="fa-regular fa-user"></i>${blog.author || ''}</span>
                    </div>
                    <h2 class="blog-title">${blog.title || ''}</h2>
                    <p class="blog-excerpt">${blog.excerpt || ''}</p>
                    <div class="blog-footer">
                        <div class="blog-tags">
                            ${(blog.tags || []).map(tag => `<span class="tag">${tag}</span>`).join('')}
                        </div>
                        <div class="blog-stats">
                            <span><i class="fa-regular fa-eye"></i>${blog.views ?? 0}</span>
                            <span><i class="fa-regular fa-heart"></i>${blog.likes ?? 0}</span>
                        </div>
                    </div>
                </article>
            `).join('');

            renderPagination(totalPages);
        }

        function renderPagination(totalPages) {
            const pagination = document.getElementById('pagination');

            if (totalPages <= 1) {
                pagination.style.display = 'none';
                return;
            }

            pagination.style.display = 'flex';

            let html = `
                <button class="page-btn" onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>
                    <i class="fa-solid fa-chevron-left"></i>
                </button>
            `;

            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 1 && i <= currentPage + 1)) {
                    html += `
                        <button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">
                            ${i}
                        </button>
                    `;
                } else if (i === currentPage - 2 || i === currentPage + 2) {
                    html += `<span style="color: var(--text-muted); padding: 0 8px;">...</span>`;
                }
            }

            html += `
                <button class="page-btn" onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>
                    <i class="fa-solid fa-chevron-right"></i>
                </button>
            `;

            pagination.innerHTML = html;
        }

        function changePage(page) {
            currentPage = page;
            renderBlogs(document.getElementById('searchInput').value);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function showToast(msg, color = '#10b981') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.style.background = color;
            t.style.display = 'block';
            setTimeout(() => { t.style.display = 'none'; }, 3000);
        }

        function openWriteModal() {
            document.getElementById('writeModal').classList.add('active');
        }
        function closeWriteModal() {
            document.getElementById('writeModal').classList.remove('active');
        }
        // 兼容旧代码调用
        function openLoginModal() { authSidebar.openModal('login'); }
        function closeLoginModal() { authSidebar.closeModal(); }
        function showRegister() { authSidebar.switchTab('register'); }

        // 登录/注册成功后刷新博客列表
        window.onAuthLogin = function() {
            token = localStorage.getItem('blog_token') || '';
            loadBlogsFromBackend();
        };
        window.onAuthLogout = function() {
            token = '';
            loadBlogsFromBackend();
        };

        async function submitBlog(published) {
            const title = document.getElementById('blogTitle').value.trim();
            const content = document.getElementById('blogContent').value.trim();
            const summary = document.getElementById('blogSummary').value.trim();
            const tagsRaw = document.getElementById('blogTags').value.trim();
            const tags = tagsRaw ? tagsRaw.split(',').map(t => t.trim()).filter(Boolean) : [];

            if (!title || !content) {
                showToast('⚠️ 标题和内容不能为空', '#f59e0b');
                return;
            }
            // 直接保存到后端（无需认证）
            try {
                const res = await fetch(`${API_BASE}/api/blog`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, content, summary, tags, published })
                });
                const json = await res.json();
                if (!res.ok) throw new Error(json.error || '发布失败');
                closeWriteModal();
                clearBlogForm();
                showToast(published ? '🎉 博客发布成功！' : '✅ 草稿已保存！');
                loadBlogsFromBackend();
            } catch (e) { showToast('❌ ' + e.message, '#ef4444'); }
        }

        function clearBlogForm() {
            document.getElementById('blogTitle').value = '';
            document.getElementById('blogContent').value = '';
            document.getElementById('blogSummary').value = '';
            document.getElementById('blogTags').value = '';
        }
    </script>
</body>
</html>
