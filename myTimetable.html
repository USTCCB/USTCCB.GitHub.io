<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Timetable - USTCCB</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .table-container {
            background: var(--card-bg);
            border: var(--glass-border);
            border-radius: 16px;
            padding: 24px;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }
        th, td {
            padding: 16px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        th {
            font-weight: 600;
            color: var(--primary-color);
            background: rgba(0,0,0,0.2);
        }
        tr:hover {
            background: rgba(255,255,255,0.02);
        }
        .period-col {
            font-weight: 600;
            color: var(--text-muted);
            width: 80px;
        }
        .course {
            background: rgba(99, 102, 241, 0.15);
            color: #e0e7ff;
            padding: 8px;
            border-radius: 6px;
            font-size: 0.9rem;
            border: 1px solid rgba(99, 102, 241, 0.2);
        }
        .course.empty {
            background: transparent;
            border: none;
        }
        .course-highlight {
            background: rgba(236, 72, 153, 0.15);
            color: #fce7f3;
            border-color: rgba(236, 72, 153, 0.2);
        }
    </style>
</head>
<body>
    <div class="background-glow"></div>
    
    <div class="app-container">
        <nav class="sidebar">
            <div class="logo">
                <i class="fa-solid fa-code-branch"></i>
                <span>USTCCB</span>
            </div>
            <ul class="nav-links">
                <li><a href="index.html"><i class="fa-solid fa-house"></i> 首页</a></li>
                <li><a href="ai-chat.html"><i class="fa-solid fa-robot"></i> AI 助手</a></li>
                <li><a href="myBlogs.html"><i class="fa-solid fa-pen-nib"></i> 博客</a></li>
                <li><a href="myAlbum.html"><i class="fa-solid fa-images"></i> 相册</a></li>
                <li><a href="games.html"><i class="fa-solid fa-gamepad"></i> 游戏实验室</a></li>
                <li class="active"><a href="myTimetable.html"><i class="fa-solid fa-calendar-days"></i> 课表</a></li>
                <li><a href="myDairy.html"><i class="fa-solid fa-book"></i> 日记</a></li>
            </ul>
        </nav>

        <main class="main-content">
            <header class="top-header">
                <h1>我的课表 📅</h1>
                <p>“他们试图埋了你，但你要知道，你是种子。”</p>
            </header>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>节次</th>
                            <th>周一</th>
                            <th>周二</th>
                            <th>周三</th>
                            <th>周四</th>
                            <th>周五</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td class="period-col">1-2</td>
                            <td><div class="course">高等数学</div></td>
                            <td><div class="course empty"></div></td>
                            <td><div class="course">大学英语</div></td>
                            <td><div class="course empty"></div></td>
                            <td><div class="course course-highlight">数据结构</div></td>
                        </tr>
                        <tr>
                            <td class="period-col">3-4</td>
                            <td><div class="course empty"></div></td>
                            <td><div class="course">线性代数</div></td>
                            <td><div class="course empty"></div></td>
                            <td><div class="course">计算机网络</div></td>
                            <td><div class="course empty"></div></td>
                        </tr>
                        <tr>
                            <td class="period-col">5-6</td>
                            <td><div class="course course-highlight">体育</div></td>
                            <td><div class="course empty"></div></td>
                            <td><div class="course">操作系统</div></td>
                            <td><div class="course empty"></div></td>
                            <td><div class="course empty"></div></td>
                        </tr>
                        <tr>
                            <td class="period-col">7-8</td>
                            <td><div class="course empty"></div></td>
                            <td><div class="course empty"></div></td>
                            <td><div class="course empty"></div></td>
                            <td><div class="course">算法导论</div></td>
                            <td><div class="course">形势与政策</div></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
